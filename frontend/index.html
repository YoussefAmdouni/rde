<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Backlog Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══ Auth Modal ══════════════════════════════════════════════════════════ -->
<div id="auth-modal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">Backlog<strong>AI</strong></span>
    </div>
    <h2 id="auth-title">Sign in</h2>
    <p class="modal-sub" id="auth-sub">Welcome back — let's ship something great.</p>
    <div id="auth-error" class="auth-msg error"></div>
    <div class="form-group">
      <label for="auth-email">Email</label>
      <input id="auth-email" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="auth-password">Password</label>
      <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button id="auth-submit" class="btn-primary" onclick="submitAuth()">Sign in</button>
    <div class="auth-footer">
      <button class="link-btn" onclick="toggleAuthMode()">
        <span id="auth-toggle-text">No account? Register free</span>
      </button>
    </div>
  </div>
</div>

<!-- ═══ Main App ════════════════════════════════════════════════════════════ -->
<div id="main-ui" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-brand">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">Backlog<strong>AI</strong></span>
    </div>

    <button class="new-session-btn" onclick="createNewConversation()">
      <i class="fa-solid fa-plus"></i> New Session
    </button>

    <div class="sidebar-label">SESSIONS</div>
    <div id="conversations-list"></div>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">U</div>
        <span id="user-email-display" class="user-email-text"></span>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Sign out">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </aside>

  <main id="main-content">
    <header id="top-bar">
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="top-bar-title" id="session-title-display">Smart Backlog Assistant</div>
      <div class="top-bar-actions">
        <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle light / dark mode">
          <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
        <button class="pill-btn hidden" id="download-btn" onclick="downloadBacklog()">
          <i class="fa-solid fa-download"></i> Download Backlog
        </button>
      </div>
    </header>

    <div id="chat-wrap">
      <div id="chat-box"></div>

      <!-- Upload panel — shown when session is idle/uploaded -->
      <div id="upload-panel">
        <!-- Chat-style composer -->
        <div class="chat-composer" id="chat-composer">
          <!-- File input — visually hidden, triggered by paperclip button -->
          <input type="file" id="notes-file-input" accept=".txt,.pdf"
                 style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"
                 onchange="handleNotesFile(event)"/>

          <!-- Attachment chip — shown once a file is selected -->
          <div id="attachment-chip" class="attachment-chip hidden">
            <i class="fa-regular fa-file-lines"></i>
            <span id="attachment-name">file.txt</span>
            <button class="chip-remove" onclick="removeAttachment()" title="Remove file">×</button>
          </div>

          <div class="composer-row">
            <button class="composer-icon-btn" title="Attach meeting notes (TXT or PDF)"
                    onclick="document.getElementById('notes-file-input').click()">
              <i class="fa-solid fa-paperclip"></i>
            </button>

            <textarea id="notes-textarea"
                      class="composer-textarea"
                      placeholder="Paste meeting notes, or 📎 attach a TXT / PDF…"
                      rows="1"
                      oninput="autoResizeComposer(this)"
                      onkeydown="composerKeydown(event)"></textarea>

            <button id="run-btn" class="composer-send-btn" onclick="runPipeline()" title="Run Backlog Agent (Ctrl+Enter)">
              <i class="fa-solid fa-arrow-up"></i>
            </button>
          </div>

          <div id="upload-error" class="composer-error"></div>
        </div>
        <p class="composer-hint">Ctrl+Enter to send</p>
      </div>

      <!-- Processing bar — shown while agent is running (steps 1-3) -->
      <div id="processing-bar" class="hidden">
        <div class="processing-status">
          <div class="proc-spinner"></div>
          <span id="processing-label">Agent is running…</span>
        </div>
      </div>

      <!-- Review panel — shown during step 4 -->
      <div id="review-panel" class="hidden">
        <div class="review-actions">
          <button class="review-btn approve" onclick="sendReview('APPROVE')">
            ✅ Approve
          </button>
          <button class="review-btn reject" onclick="sendReview('REJECT')">
            ❌ Reject
          </button>
          <button class="review-btn edit" onclick="showEditModal()">
            ✏️ Edit
          </button>
        </div>
      </div>

      <!-- Normal chat input — shown post-pipeline for follow-up (disabled here, kept for UX) -->
      <div id="chat-input-bar" class="hidden">
        <input id="user-input" placeholder="Ask a follow-up question…" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="btn-primary send-btn" onclick="sendChat()">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- ═══ Edit Modal ══════════════════════════════════════════════════════════ -->
<div id="edit-modal" class="modal-overlay hidden">
  <div class="modal-card wide">
    <h2>Edit Proposed Change</h2>
    <p class="modal-sub">Enter JSON fields to override (e.g. <code>{"updated_priority":"High"}</code>)</p>
    <textarea id="edit-json-input" rows="8" placeholder='{"updated_priority": "High"}'></textarea>
    <div id="edit-error" class="auth-msg error"></div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn-primary" onclick="submitEdit()">Apply Edit</button>
      <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══ Loading overlay ═════════════════════════════════════════════════════ -->
<div id="loading-overlay" class="hidden">
  <div class="loader-card">
    <div class="spinner-ring"></div>
    <div id="loader-text">Processing…</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
